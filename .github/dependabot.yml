# Dependabot version updates. See:
# https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference
#
# A 3-day `cooldown` delays version-update PRs until a release has been public for 3 days,
# so a freshly published (potentially compromised) version isn't proposed the instant it
# lands — a guard against supply-chain attacks. Note: cooldown applies to *version* updates
# only; security updates for known vulnerabilities are still raised promptly.
version: 2
updates:
  # GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5

  # Node/npm dependencies (root package.json + package-lock.json).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5

  # Rust crates for the Tauri backend (src-tauri/Cargo.toml + Cargo.lock).
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
