name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same ref (e.g. a push and its pull_request event,
# or rapid successive pushes) to avoid wasting slow/expensive macOS runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Rust tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-src-tauri
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  build:
    name: Build Tauri app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-src-tauri
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri -- build
