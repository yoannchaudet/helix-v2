name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref. With CI triggered by pull_request (PR branches)
# and push to main only, this means a rapid re-push to a PR branch cancels its earlier
# in-flight run — saving slow/expensive macOS minutes — without ever double-running a
# commit (feature-branch pushes no longer trigger a duplicate run alongside the PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-src-tauri
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  e2e:
    name: UI tests (Playwright)
    # Browser-based UI tests run on Linux (fast Chromium) — they load the real frontend with
    # a mocked Tauri backend, so they need no macOS/WKWebView runner. Engine-specific quirks
    # stay manual (see tests/e2e and issue #63).
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run test:e2e

  build:
    name: Build Tauri app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-src-tauri
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Tauri app
        # Compile-only smoke test: `--no-bundle` skips bundling, so CI never creates or signs
        # the updater artifact and therefore needs no signing key. The release workflow does
        # the full signed/notarized bundle (with secrets from a protected environment).
        run: npm run tauri -- build --no-bundle
