name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same branch. Using `head_ref || ref_name` collapses a
# branch push and its pull_request event into one group, so we don't run the same commit
# twice and rapid re-pushes cancel earlier runs — saving slow/expensive macOS minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-src-tauri
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  build:
    name: Build Tauri app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-src-tauri
          workspaces: src-tauri -> target

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Tauri app
        # Compile-only smoke test: `--no-bundle` skips bundling, so CI never creates or signs
        # the updater artifact and therefore needs no signing key. The release workflow does
        # the full signed/notarized bundle (with secrets from a protected environment).
        run: npm run tauri -- build --no-bundle
